<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эпизод {{ q_id }} | Исследование темперамента</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #1e4a3a;
            padding: 2rem 1rem;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 760px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .progress {
            background: #e2e8f0;
            height: 8px;
            width: 100%;
        }
        .progress-bar {
            width: {{ (q_id / total_questions) * 100 }}%;
            height: 8px;
            background: #e74c3c;
            transition: width 0.3s ease;
        }
        .content {
            padding: 2rem;
        }
        .badge {
            display: inline-block;
            background: #e0e7ff;
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        .story {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin: 1.5rem 0;
            border-left: 6px solid #f1c40f;
            line-height: 1.5;
        }
        .options {
            margin: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .option-item {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .option-item:hover {
            background: #fef9e3;
            border-color: #f1c40f;
            transform: translateX(5px);
        }
        input[type="radio"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #e74c3c;
            cursor: pointer;
        }
        label {
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        button, .back-btn {
            background: #e74c3c;
            color: white;
            font-weight: 700;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 2.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            flex: 1;
        }
        .back-btn {
            background: #6c757d;
        }
        button:hover, .back-btn:hover {
            transform: scale(0.98);
            filter: brightness(0.95);
        }
        @media (max-width: 550px) {
            .content { padding: 1.5rem; }
            .nav-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="content">
        <div class="badge">Эпизод {{ q_id }} из {{ total_questions }}</div>
        <h2>{{ episode.title }}</h2>
        <div class="story">
            <p>
                {{ episode.description }}
            </p>
        </div>

        <form method="post" action="{{ url_for('answer', q_id=q_id) }}">
            <div class="options">
                {% for option in options %}
                    <div class="option-item">
                        <input type="radio" name="option" value="{{ option.id }}" id="opt_{{ option.id }}"
                               {% if selected == option.id %}checked{% endif %} required>
                        <label for="opt_{{ option.id }}">{{ option.option_text }}</label>
                    </div>
                {% endfor %}
            </div>
            <div class="nav-buttons">
                {% if q_id > 1 %}
                    <a href="{{ url_for('question', q_id=q_id-1) }}" class="back-btn">← Назад</a>
                {% else %}
                    <span></span>
                {% endif %}
                <button type="submit">Дальше →</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
