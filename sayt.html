
    <!DOCTYPE html>
    <html>
        <head>
            <meta charset="UTF-8">
            <title>Сайт для Самая лучшая мама</title>
             <style>
                body {
                    background: linear-gradient(145deg, #ffe6f0, #ffd0e0);
                    font-family: 'Segoe UI', Arial, sans-serif;
                    text-align: center;
                    padding: 30px;
                }
                .card {
                    background: white;
                    max-width: 600px;
                    margin: auto;
                    padding: 30px;
                    border-radius: 60px 20px 60px 20px;
                    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                }
            img {
                    border-radius: 50%;
                    width: 200px;
                    height: 200px;
                    object-fit: cover;
                    border: 5px solid #ff99bb;
                    margin-top: 10px;
                }
                h1 {
                    color: #b33b5c;
                }
                ul {
                    text-align: left;
                    display: inline-block;
                    background: #fff0f5;
                    padding: 20px 40px;
                    border-radius: 30px;
                }
                li {
                    font-size: 1.2em;
                    margin: 8px 0;
                }
                .footer {
                    margin-top: 30px;
                    font-style: italic;
                    color: #a06677;
                }
            </style>
        </head>
        <body>
            <div class="card">
                <h1>🌟 Самая лучшая мама 🌟</h1>
                
                <!-- ФОТО: поместите файл mama.jpg в ту же папку -->
                <img src="mama.jpg" alt="Фото мамы" onerror="this.src='https://via.placeholder.com/200?text=Добавьте+фото'">
                
                <h2>❤️ Ее чудесные качества ❤️</h2>
                <ul><li>Красивая</li><li>Милая</li><li>Целеустремленная</li><li>Веселая</li><li>Заботливая</li><li>Добрая</li></ul>
                
                <div class="footer">
                    Спасибо, что ты у меня есть! <br>
                    Сделано с любовью на Python 🐍
                </div>
            </div>
        </body>
        </html>
