<!DOCTYPE html>
<h1> {{ title  }}   </h1>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="http://127.0.0.1:5000/api/v1/account" method="post" >
  <div class="form-example">
    <label for="name">Enter your login: </label>
    <input type="text" name="login" required />
  </div>
  <div class="form-example">
    <label for="email">Enter your password: </label>
    <input type="text" name="passwd" required />
  </div>
  <div class="form-example">
    <input type="submit" value="Subscribe!" />
  </div>
</form>



<ul>
    {% for item in data %}
        <!-- <li>{{ item[1] }} <br> {{ item[1] }}   <a href="/api/v1/account/{{ item[0] }} "> X</a>  </li> -->
        <li>{{ item[1] }}   <a href="/api/v1/account/{{ item[0] }} "> X</a>  </li>
    {% endfor %}

</ul>




</body>
</html>
